<!DOCTYPE html>
<html>
<head>
  <script>
    const path = window.location.pathname.toLowerCase();

    if (path === "/about") {
        window.location.replace("https://service.mpautomechanics.com/?page=About");
    }
    else if (path === "/services") {
        window.location.replace("https://service.mpautomechanics.com/?page=Services");
    }
    else if (path === "/contact") {
        window.location.replace("https://service.mpautomechanics.com/?page=Contact");
    }
    else if (path === "/profile") {
        window.location.replace("https://service.mpautomechanics.com/?page=Profile");
    }
    else {
        window.location.replace("https://mpautomechanics.com/");
    }
  </script>
</head>
<body></body>
</html>
