<!DOCTYPE html>
<html>
<head>
  <script>
    const path = window.location.pathname.toLowerCase();

    if (path === "/about") {
        window.location.replace("https://mpautomechanics.com/about");
    }
    else if (path === "/services") {
        window.location.replace("https://mpautomechanics.com/services");
    }
    else if (path === "/contact") {
        window.location.replace("https://mpautomechanics.com/contact");
    }
    else if (path === "/profile") {
        window.location.replace("https://mpautomechanics.com/profile");
    }
    else {
        window.location.replace("https://mpautomechanics.com/");
    }
  </script>
</head>
<body></body>
</html>
